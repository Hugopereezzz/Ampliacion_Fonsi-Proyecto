<!-- src/app/components/lobby-principal/lobby-principal.html -->

<div class="lobby-container">

  <!-- Barra de Navegación Superior -->
  <app-nav-bar class="area-nav"></app-nav-bar>

  <!-- Panel Izquierdo: Ranking Global -->
  <app-global-ranking class="area-ranking cyber-panel panel-red"></app-global-ranking>

  <!-- Panel Central Superior: Acciones de Lobby (Crear / Unirse) -->
  <app-lobby-creation
    class="area-actions cyber-panel"
    (salaUnida)="onSalaUnida($event)"
  ></app-lobby-creation>

  <!-- Panel Central Inferior: Lobbies Disponibles -->
  <app-available-lobbies
    class="area-lobbies cyber-panel"
    (salaUnida)="onSalaUnida($event)"
  ></app-available-lobbies>

  <!-- Panel Derecho: Chat Global -->
  <app-global-chat class="area-chat cyber-panel"></app-global-chat>

</div>
