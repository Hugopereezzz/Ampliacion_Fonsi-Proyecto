# ==========================================
# 2. BASES DE DATOS NO-RELACIONALES (MongoDB)
# ==========================================

# --- OPCIÓN D: MongoDB Local ---
spring.data.mongodb.uri=mongodb://localhost:27017/estadisticasdb

# --- OPCIÓN E: MongoDB en Azure (Cosmos DB o Atlas) ---
# spring.data.mongodb.uri=mongodb://TU_USUARIO:TU_PASSWORD@TU_AZURE_COSMOS.mongo.cosmos.azure.com:10255/estadisticasdb?ssl=true&retrywrites=false


# ==========================================
# 3. CONFIGURACIÓN GENERAL JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
